interface=wlan1
driver=nl80211

ssid=DefenderPi_AP_2G

# 🔥 REQUIRED
country_code=IN
hw_mode=g
channel=6

# 802.11n enabled but NOT forced
ieee80211n=1
wmm_enabled=1
ht_capab=[SHORT-GI-20]

# ❌ removed require_ht=1 (important)

# 🔥 Allow real LAN behavior
ap_isolate=0

# Security
auth_algs=1
ignore_broadcast_ssid=0
wpa=2
wpa_passphrase=CHANGE_ME
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# 🔥 Stability tuning
beacon_int=100
dtim_period=2
max_num_sta=25
disassoc_low_ack=0

ctrl_interface=/run/hostapd/wlan1-2g
ctrl_interface_group=0
