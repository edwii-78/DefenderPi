# Hostapd configuration for DefenderPi 5 GHz AP
interface=wlan1
driver=nl80211

# --- Stability additions ---
country_code=IN
ieee80211d=1
ieee80211h=1

ssid=DefenderPi_AP_5G
hw_mode=a
channel=44

# ---- Force stable HT only (disable VHT/AC) ----
ieee80211n=1
ieee80211ac=0

# ---- Force 20 MHz only (avoid HT40/VHT instability) ----
ht_capab=[HT20]

wmm_enabled=1
auth_algs=1
ignore_broadcast_ssid=0

ap_isolate=0

wpa=2
wpa_passphrase=CHANGE_ME
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP

# ---- Prevent aggressive disassociation ----
disassoc_low_ack=0

ctrl_interface=/run/hostapd/wlan1-5g
ctrl_interface_group=0
