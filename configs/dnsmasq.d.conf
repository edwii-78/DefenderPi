# wlan1 AP mode DHCP for DefenderPi
interface=wlan1
bind-interfaces
listen-address=192.168.50.1

# DHCP pool for AP clients
dhcp-range=192.168.50.10,192.168.50.100,12h
dhcp-option=3,192.168.50.1        # Gateway = Pi
dhcp-option=6,192.168.50.1        # DNS = Pi-hole FTL on Pi

domain-needed
bogus-priv

# ONLY DHCP – do not serve DNS; Pi-hole handles DNS
port=0

# Optional: static reservation example
dhcp-host=6a:db:68:84:7d:85,192.168.50.21

